<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="DocLatch logo">
  <title>DocLatch</title>

  <!-- Document body -->
  <rect x="8" y="4" width="38" height="50" rx="4" fill="#E24B4A"/>

  <!-- Folded corner -->
  <path d="M38 4 L46 12 L38 12 Z" fill="#B83B3A"/>
  <path d="M38 4 L46 12 H38 Z" fill="white" opacity="0.25"/>

  <!-- Text lines on document -->
  <rect x="14" y="20" width="24" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="14" y="27" width="20" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="14" y="34" width="22" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="14" y="41" width="16" height="3" rx="1.5" fill="white" opacity="0.5"/>

  <!-- Magnifying glass circle -->
  <circle cx="46" cy="46" r="13" fill="#1e1e1e" opacity="0.12"/>
  <circle cx="46" cy="46" r="11" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="46" cy="46" r="6.5" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>

  <!-- Magnifying glass handle -->
  <line x1="51" y1="51" x2="57.5" y2="57.5" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
</svg>

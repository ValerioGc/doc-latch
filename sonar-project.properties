sonar.projectKey=pdf-reader
sonar.projectName=PDF Reader/Editor
sonar.projectVersion=0.1.0
sonar.organization=your-org-here

# Source directories
sonar.sources=src,src-tauri/src
sonar.tests=tests

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/coverage/**,**/*.d.ts,**/icons/**

# Coverage exclusions
sonar.coverage.exclusions=tests/**,**/*.spec.ts,**/*.test.ts,src/main.ts,src/types/**,src/router/**

# Duplication exclusions
sonar.cpd.exclusions=src/I18n/**,tests/**

# Encoding
sonar.sourceEncoding=UTF-8

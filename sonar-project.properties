sonar.projectKey=pdf-reader
sonar.projectName=PDF Reader/Editor
sonar.projectVersion=0.1.0
sonar.organization=your-org-here

# Source directories
sonar.sources=src,src-tauri/src
sonar.tests=tests

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.rust.lcov.reportPaths=coverage/rust-lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/coverage/**,**/*.d.ts,**/icons/**

# Coverage exclusions
sonar.coverage.exclusions=tests/**,**/*.spec.ts,**/*.test.ts,src/types/**,src/styles/**,src/router/**,src-tauri/src/main.rs,src-tauri/src/lib.rs,src-tauri/src/**/tests.rs,src-tauri/src/test_support.rs

# Duplication exclusions
sonar.cpd.exclusions=src/I18n/**,tests/**,src-tauri/src/**/tests.rs,src-tauri/src/test_support.rs

# Encoding
sonar.sourceEncoding=UTF-8
